name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  # Tên repository trên Docker Hub của bạn
  IMAGE_NAME: huy8895/furigana4subtitles

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Tải file font OsakaMono.ttf trước khi build vì tệp font này nằm trong .gitignore và không được commit lên GitHub.
      # Điều này giúp Docker build trong GitHub Actions có đầy đủ file font local như môi trường máy cá nhân của bạn.
      - name: Create fonts directory and download Osaka font
        run: |
          mkdir -p fonts
          curl -L -o fonts/OsakaMono.ttf "https://github.com/gilbo/rawgui/raw/master/assets/OsakaMono.ttf"

      # Cài đặt QEMU để hỗ trợ build multi-platform (amd64 và arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Cài đặt Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Đăng nhập vào Docker Hub sử dụng Secrets lưu trong GitHub Repository
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Trích xuất metadata (tags, labels) cho Docker image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build và Push Docker image lên Docker Hub cho cả 2 kiến trúc CPU (Windows x86_64 và Mac ARM64)
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
